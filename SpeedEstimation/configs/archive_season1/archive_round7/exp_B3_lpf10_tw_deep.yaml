# =============================================================================
# archive_round7 — B3: Input LPF 10Hz + Time Warp + Deep TCN (no smooth loss)
# HYPOTHESIS: LPF + time warp without smooth loss. Tests if augmentation
#   handles smoothness better than explicit loss term.
# CHANGES vs baseline:
#   - input_lpf_cutoff_hz: 10, input_lpf_order: 4
#   - channels: 8-layer deep TCN
#   - time_warp_sigma: 0.2
# =============================================================================

exp_name: exp_B3_lpf10_tw_deep

shared:
  model:
    channels: [32, 32, 64, 64, 128, 128, 128, 128]
  input_lpf_cutoff_hz: 10.0
  input_lpf_order: 4

02_train:
  data:
    input_lpf_cutoff_hz: 10.0
    input_lpf_order: 4
  model:
    channels: [32, 32, 64, 64, 128, 128, 128, 128]
  train:
    time_warp_sigma: 0.2
