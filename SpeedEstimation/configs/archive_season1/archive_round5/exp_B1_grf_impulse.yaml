# =============================================================================
# archive_round5 — B1: GRF Impulse (Leading Indicator)
# HYPOTHESIS: Cumulative AP impulse within each stance phase captures
#   propulsion/braking dynamics and serves as a leading indicator for
#   speed changes (force changes BEFORE speed changes).
# CHANGES vs baseline:
#   - Added grf_impulse_l, grf_impulse_r (2 ch) → total 36 features
# =============================================================================

exp_name: exp_B1_grf_impulse

shared:
  input_vars:
    - ["mocap/kin_q", ["hip_flexion_l", "hip_flexion_r", "knee_angle_l", "knee_angle_r", "ankle_angle_l", "ankle_angle_r"]]
    - ["mocap/kin_q", ["hip_flexion_l_dot", "hip_flexion_r_dot", "knee_angle_l_dot", "knee_angle_r_dot", "ankle_angle_l_dot", "ankle_angle_r_dot"]]
    - ["mocap/kin_q", ["hip_flexion_l_ddot", "hip_flexion_r_ddot", "knee_angle_l_ddot", "knee_angle_r_ddot", "ankle_angle_l_ddot", "ankle_angle_r_ddot"]]
    - ["robot/back_imu", ["roll", "pitch", "yaw", "vel_forward"]]
    - ["robot/left",  ["torque"]]
    - ["robot/right", ["torque"]]
    - ["forceplate/grf/left",  ["x", "y", "z", "contact_l"]]
    - ["forceplate/grf/right", ["x", "y", "z", "contact_r"]]
    - ["sub_info", ["height", "weight"]]
    - ["derived", ["grf_impulse_l", "grf_impulse_r"]]
  # Total: 36 features

02_train:
  data:
    total_input_features: 36
