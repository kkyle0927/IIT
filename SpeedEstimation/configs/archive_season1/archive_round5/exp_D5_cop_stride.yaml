# =============================================================================
# archive_round5 — D5: CoP Velocity + Stride Frequency (direct speed proxies)
# HYPOTHESIS: CoP forward velocity and stride frequency are directly
#   proportional to walking speed with minimal phase lag. These provide
#   near-instantaneous speed proxies compared to joint kinematics.
# CHANGES vs baseline:
#   - Added cop_vel_y_l/r + stride_freq_l/r (4 ch) → total 38 features
# =============================================================================

exp_name: exp_D5_cop_stride

shared:
  input_vars:
    - ["mocap/kin_q", ["hip_flexion_l", "hip_flexion_r", "knee_angle_l", "knee_angle_r", "ankle_angle_l", "ankle_angle_r"]]
    - ["mocap/kin_q", ["hip_flexion_l_dot", "hip_flexion_r_dot", "knee_angle_l_dot", "knee_angle_r_dot", "ankle_angle_l_dot", "ankle_angle_r_dot"]]
    - ["mocap/kin_q", ["hip_flexion_l_ddot", "hip_flexion_r_ddot", "knee_angle_l_ddot", "knee_angle_r_ddot", "ankle_angle_l_ddot", "ankle_angle_r_ddot"]]
    - ["robot/back_imu", ["roll", "pitch", "yaw", "vel_forward"]]
    - ["robot/left",  ["torque"]]
    - ["robot/right", ["torque"]]
    - ["forceplate/grf/left",  ["x", "y", "z", "contact_l", "stride_freq_l"]]
    - ["forceplate/grf/right", ["x", "y", "z", "contact_r", "stride_freq_r"]]
    - ["sub_info", ["height", "weight"]]
    - ["derived", ["cop_vel_y_l", "cop_vel_y_r"]]
  # Total: 40 features

02_train:
  data:
    total_input_features: 40
