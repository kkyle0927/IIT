# =============================================================================
# archive_round5 — A2: COM Chain Full (individual segment velocities)
# HYPOTHESIS: Providing individual segment velocity contributions (ankle, knee, hip)
#   alongside the combined COM velocity allows the model to learn which segments
#   are most informative at different gait phases.
# CHANGES vs baseline:
#   - Added 4 ch: com_velocity_chain + segment_vel_ankle/knee/hip → total 38 features
# =============================================================================

exp_name: exp_A2_com_chain_full

shared:
  input_vars:
    - ["mocap/kin_q", ["hip_flexion_l", "hip_flexion_r", "knee_angle_l", "knee_angle_r", "ankle_angle_l", "ankle_angle_r"]]
    - ["mocap/kin_q", ["hip_flexion_l_dot", "hip_flexion_r_dot", "knee_angle_l_dot", "knee_angle_r_dot", "ankle_angle_l_dot", "ankle_angle_r_dot"]]
    - ["mocap/kin_q", ["hip_flexion_l_ddot", "hip_flexion_r_ddot", "knee_angle_l_ddot", "knee_angle_r_ddot", "ankle_angle_l_ddot", "ankle_angle_r_ddot"]]
    - ["robot/back_imu", ["roll", "pitch", "yaw", "vel_forward"]]
    - ["robot/left",  ["torque"]]
    - ["robot/right", ["torque"]]
    - ["forceplate/grf/left",  ["x", "y", "z", "contact_l"]]
    - ["forceplate/grf/right", ["x", "y", "z", "contact_r"]]
    - ["sub_info", ["height", "weight"]]
    - ["derived", ["com_velocity_chain", "segment_vel_ankle", "segment_vel_knee", "segment_vel_hip"]]
  # Total: 38 features

02_train:
  data:
    total_input_features: 38
