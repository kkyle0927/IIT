exp_name: exp_C4_freq_deep_tcn

shared:
  model:
    channels: [32, 32, 64, 64, 128, 128, 128, 128]

02_train:
  model:
    channels: [32, 32, 64, 64, 128, 128, 128, 128]
  train:
    loss_penalty: frequency_cutoff_penalty
    loss_penalty_weight: 0.005
