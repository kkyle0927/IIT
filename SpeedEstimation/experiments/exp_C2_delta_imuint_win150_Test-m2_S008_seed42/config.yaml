02_train:
  data:
    est_tick_ranges:
    - 5
    normalize: true
    normalize_type: standard
    stride: 5
    stride_inf: 1
    target_transform:
      input_channel_idx: 25
      mode: delta_from_input
    time_window_output: 1
    use_gait_phase: false
    use_physical_velocity_model: false
    window_size: 150
    y_delay: 5
  loader:
    batch_size: 128
    val_batch_size: 256
  model:
    ar_feedback:
      enable: false
    attention_heads: 0
    attention_type: null
    channels: &id003
    - 32
    - 32
    - 64
    - 64
    - 128
    - 128
    dropout: 0.2
    gating_signal: null
    gru_hidden: 32
    head_dropout: 0.5
    head_hidden:
    - 64
    input_norm_type: instance
    kernel_size: 5
    model_norm: batch
    type: TCN_GRU
    use_input_norm: true
    use_norm: true
  train:
    amp: true
    augment_noise_std: 0.03
    cos_T0: 10
    cos_Tmult: 1
    device: cuda
    early_stop_min_delta: 1e-04
    early_stop_patience: 10
    early_stop_warmup: 10
    epochs: 30
    eta_min: 1.0e-05
    huber_delta: 0.1
    k_fold: 4
    kinematic_loss_degrees: false
    kinematic_loss_tolerance: 0.05
    kinematic_loss_weight_limit: 0
    kinematic_loss_weight_pos: 0.0
    loss: huber
    loss_penalty: null
    loss_penalty_cutoff: null
    loss_penalty_weight: 0.0
    lr: 0.001
    save_dir: ./runs_tcn
    smoothness_loss_weight: 0.0
    task_type: regression
    train_loss_target: 0.0
    wd: 0.001
03_eval:
  data:
    est_tick_ranges:
    - 5
    normalize: true
    stride: 5
    stride_inf: 1
    target_transform:
      input_channel_idx: 25
      mode: delta_from_input
    time_window_output: 1
    window_size: 150
    y_delay: 5
  scaler_path: ./runs_tcn/scaler.npz
  split:
    level: subject
    loso_subjects:
    - m2_S008
    manual:
      test:
      - m2_S008
      val:
      - m2_S007
    mode: loso
    ratio:
    - 0.7
    - 0.15
    - 0.15
    save_to: null
    seed: 42
  train:
    device: cuda
conditions: &id001
- level_075mps
- level_100mps
- level_125mps
- accel_sine
- decline_5deg
- incline_10deg
- stopandgo
cv_mode: loso
data_path: ./combined_data_S008.h5
est_tick_ranges:
- 5
exp_name: exp_C2_delta_imuint_win150
shared:
  conditions: *id001
  data:
    est_tick_ranges:
    - 5
    normalize: true
    stride: 5
    stride_inf: 1
    target_transform:
      input_channel_idx: 25
      mode: delta_from_input
    time_window_output: 1
    window_size: 150
    y_delay: 5
  data_sources:
    milestone2:
      exclude_subjects: []
      path: ./combined_data_S008.h5
      prefix: m2_
  input_vars:
  - - mocap/kin_q
    - - hip_flexion_l
      - hip_flexion_r
      - knee_angle_l
      - knee_angle_r
      - ankle_angle_l
      - ankle_angle_r
  - - mocap/kin_q
    - - hip_flexion_l_dot
      - hip_flexion_r_dot
      - knee_angle_l_dot
      - knee_angle_r_dot
      - ankle_angle_l_dot
      - ankle_angle_r_dot
  - - mocap/kin_q
    - - hip_flexion_l_ddot
      - hip_flexion_r_ddot
      - knee_angle_l_ddot
      - knee_angle_r_ddot
      - ankle_angle_l_ddot
      - ankle_angle_r_ddot
  - - derived/body_frame_imu
    - - accel_right
      - accel_forward
      - accel_up
      - gyro_right
      - gyro_forward
      - gyro_up
      - forward_accel_overground
  - - derived/imu_integrated_speed
    - - imu_integrated_speed
  - - robot/left
    - - torque
  - - robot/right
    - - torque
  - - forceplate/grf/left
    - - x
      - y
      - z
      - contact_l
  - - forceplate/grf/right
    - - x
      - y
      - z
      - contact_r
  - - sub_info
    - - height
      - weight
  lpf_cutoff: 0.5
  lpf_order: 4
  model:
    ar_feedback:
      enable: false
    attention_heads: 0
    attention_type: null
    channels:
    - 32
    - 32
    - 64
    - 64
    - 128
    - 128
    dropout: 0.2
    gating_signal: null
    gru_hidden: 32
    head_dropout: 0.5
    head_hidden:
    - 64
    input_norm_type: instance
    kernel_size: 5
    model_norm: batch
    type: TCN_GRU
    use_input_norm: true
    use_norm: true
  output_vars:
  - - treadmill/left
    - - speed_leftbelt
  subjects: &id002
  - m2_S001
  - m2_S002
  - m2_S003
  - m2_S004
  - m2_S005
  - m2_S006
  - m2_S007
  - m2_S008
subjects: *id002
tcn_channels: *id003
