02_train:
  data:
    calibrate_robot_thigh: true
    est_tick_ranges: &id001
    - 0
    normalize: true
    normalize_type: standard
    residual_target: true
    stride: 5
    stride_inf: 1
    time_window_output: 1
    use_complementary_filter_euler: true
    window_size: 100
    y_delay: 0
  loader:
    batch_size: 128
    val_batch_size: 256
  model: &id003
    channels:
    - 16
    - 24
    - 24
    - 48
    dropout: 0.1
    head_dropout: 0.1
    head_hidden:
    - 32
    kernel_size: 3
    model_norm: layer
    type: TCN
    use_norm: true
  train:
    amp: true
    augment_noise_std: 0.01
    cos_T0: 10
    cos_Tmult: 1
    device: cuda
    early_stop_min_delta: 0.0001
    early_stop_patience: 10
    early_stop_warmup: 10
    epochs: 30
    eta_min: 1.0e-05
    k_fold: 4
    lr: 0.001
    save_dir: ./runs_tcn
    task_type: regression
    wd: 0.01
03_eval:
  data: &id002
    calibrate_robot_thigh: true
    est_tick_ranges: *id001
    normalize: true
    residual_target: true
    stride: 5
    stride_inf: 1
    time_window_output: 1
    use_complementary_filter_euler: true
    window_size: 100
    y_delay: 0
  scaler_path: ./runs_tcn/scaler.npz
  split:
    level: subject
    loso_subjects:
    - m2_S008
    manual:
      test:
      - m2_S008
      val:
      - m2_S007
    mode: loso
    ratio:
    - 0.7
    - 0.15
    - 0.15
    save_to: null
    seed: 42
  train:
    device: cuda
