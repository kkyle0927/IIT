02_train:
  data:
    est_tick_ranges:
    - 5
    level_selection:
      include:
      - lv0
    normalize: true
    normalize_type: standard
    stride: 5
    stride_inf: 1
    time_window_output: 1
    window_size: 300
    y_delay: 5
  loader:
    batch_size: 128
    val_batch_size: 256
  model:
    ar_feedback:
      enable: false
    assist_state_index: 22
    bias_scale: 0.1
    branch_channels:
    - 28
    - 28
    - 56
    - 56
    branch_input_dims:
    - 20
    - 28
    - 40
    channels: &id003
    - 24
    - 24
    - 48
    - 48
    dropout: 0.15
    gate_temperature: 0.95
    gru_hidden: 32
    hard_switch: true
    head_dropout: 0.25
    head_hidden:
    - 64
    input_norm_type: instance
    kernel_size: 5
    model_norm: batch
    off_scale: 0.03
    on_scale: 0.18
    residual_scale: 0.04
    type: AssistSwitchHeadTCN_GRU
    use_input_norm: true
  train:
    amp: true
    augment_noise_std: 0.02
    cos_T0: 10
    cos_Tmult: 1
    device: cuda
    early_stop_min_delta: 0.0001
    early_stop_patience: 6
    early_stop_warmup: 4
    epochs: 18
    eta_min: 1.0e-05
    huber_delta: 0.1
    k_fold: 4
    loss: huber
    lr: 0.0008
    save_dir: ./runs_tcn
    task_type: regression
    wd: 0.001
03_eval:
  data:
    est_tick_ranges:
    - 5
    level_selection:
      include:
      - lv0
    normalize: true
    stride: 5
    stride_inf: 1
    time_window_output: 1
    window_size: 300
    y_delay: 5
  scaler_path: ./runs_tcn/scaler.npz
  split:
    level: subject
    loso_subjects:
    - m2_S001
    - m2_S004
    - m2_S008
    mode: loso
    ratio:
    - 0.7
    - 0.15
    - 0.15
    save_to: null
    seed: 42
  train:
    device: cuda
conditions: &id001
- level_075mps
- level_100mps
- level_125mps
- accel_sine
- decline_5deg
- incline_10deg
