exp_name: exp_N1_gaitspeed_storedtarget_baseline
cv_mode: loso
data_path: ./combined_data_S008.h5
time_window_input: 300
subjects: &subs
  - m2_S001
  - m2_S002
  - m2_S003
  - m2_S004
  - m2_S005
  - m2_S006
  - m2_S007
  - m2_S008
conditions: &conds
  - level_075mps
  - level_100mps
  - level_125mps
  - accel_sine
  - decline_5deg
  - incline_10deg
  - stopandgo
est_tick_ranges: [5]
shared:
  subjects: *subs
  conditions: *conds
  data:
    window_size: 300
    time_window_output: 1
    stride: 5
    stride_inf: 1
    normalize: true
    est_tick_ranges: [5]
    y_delay: 5
  data_sources:
    milestone2:
      path: ../combined_data_S008.h5
      prefix: m2_
      exclude_subjects: []
  input_vars:
    - [derived/body_frame_imu, [accel_right, accel_forward, accel_up, gyro_right, gyro_forward, gyro_up, forward_accel_overground]]
    - [derived/imu_integrated_speed, [imu_integrated_speed]]
    - [derived/robot_biomech_rt, [phase_sin_l, phase_cos_l, phase_sin_r, phase_cos_r, cadence_l, cadence_r, hip_power_l, hip_power_r, thigh_power_l, thigh_power_r, torque_rms_l, torque_rms_r, thigh_vel_rms_l, thigh_vel_rms_r, gyro_forward_rms]]
    - [robot/left, [hip_angle, hip_angle_dot, hip_angle_ddot, thigh_angle, thigh_angle_dot, thigh_angle_ddot, torque]]
    - [robot/right, [hip_angle, hip_angle_dot, hip_angle_ddot, thigh_angle, thigh_angle_dot, thigh_angle_ddot, torque]]
    - [sub_info, [height, weight]]
  output_vars:
    - [common, [v_Y_true]]
  lpf_cutoff: 0.5
  lpf_order: 4
  target_lpf_mode: none
  model:
    type: DualBranchTCN_GRU
    channels: &ch [24, 24, 48, 48]
    branch_channels: [24, 24, 48, 48]
    branch_input_dims: [8, 31]
    kernel_size: 5
    dropout: 0.15
    gru_hidden: 32
    head_hidden: [64]
    head_dropout: 0.3
    use_input_norm: true
    use_norm: true
    model_norm: batch
    input_norm_type: instance
02_train:
  data:
    window_size: 300
    time_window_output: 1
    stride: 5
    stride_inf: 1
    normalize: true
    normalize_type: standard
    est_tick_ranges: [5]
    y_delay: 5
    use_gait_phase: false
    use_physical_velocity_model: false
    target_lpf_mode: none
  loader:
    batch_size: 128
    val_batch_size: 256
  model:
    type: DualBranchTCN_GRU
    channels: *ch
    branch_channels: [24, 24, 48, 48]
    branch_input_dims: [8, 31]
    kernel_size: 5
    dropout: 0.15
    gru_hidden: 32
    head_hidden: [64]
    head_dropout: 0.3
    use_input_norm: true
    use_norm: true
    model_norm: batch
    input_norm_type: instance
  train:
    device: cuda
    amp: true
    allow_tf32: true
    cudnn_benchmark: true
    clear_cuda_cache_each_epoch: false
    epochs: 30
    early_stop_patience: 10
    early_stop_warmup: 10
    early_stop_min_delta: 1e-4
    lr: 0.001
    wd: 0.001
    loss: huber
    huber_delta: 0.1
    cos_T0: 10
    cos_Tmult: 1
    eta_min: 1.0e-5
    augment_noise_std: 0.02
    task_type: regression
    save_dir: ./runs_tcn
03_eval:
  data:
    window_size: 300
    time_window_output: 1
    stride: 5
    stride_inf: 1
    est_tick_ranges: [5]
    y_delay: 5
    normalize: true
    target_lpf_mode: none
  split:
    mode: loso
    level: subject
    seed: 42
    loso_subjects: [m2_S008]
    manual:
      val: [m2_S007]
      test: [m2_S008]
  train:
    device: cuda
  scaler_path: ./runs_tcn/scaler.npz
tcn_channels: *ch
