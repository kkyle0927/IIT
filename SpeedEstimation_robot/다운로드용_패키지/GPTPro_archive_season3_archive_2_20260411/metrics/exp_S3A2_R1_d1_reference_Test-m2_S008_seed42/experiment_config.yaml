02_train:
  data:
    est_tick_ranges:
    - 5
    normalize: true
    normalize_type: standard
    stride: 5
    stride_inf: 1
    time_window_output: 1
    use_gait_phase: false
    use_physical_velocity_model: false
    window_size: 300
    y_delay: 5
  loader:
    batch_size: 128
    val_batch_size: 256
  model:
    ar_feedback:
      enable: false
    bias_scale: 0.18
    branch_channels:
    - 24
    - 24
    - 48
    - 48
    branch_input_dims:
    - 20
    - 16
    - 24
    channels: &id003
    - 24
    - 24
    - 48
    - 48
    dropout: 0.15
    gate_temperature: 1.0
    gru_hidden: 32
    head_dropout: 0.25
    head_hidden:
    - 64
    input_norm_type: instance
    kernel_size: 5
    model_norm: batch
    residual_scale: 0.05
    state_leak: 0.94
    type: PersistentBiasTCN_GRU
    use_input_norm: true
    use_norm: true
  train:
    allow_tf32: true
    amp: true
    augment_noise_std: 0.02
    clear_cuda_cache_each_epoch: false
    cos_T0: 10
    cos_Tmult: 1
    cudnn_benchmark: true
    device: cuda
    early_stop_min_delta: 0.0001
    early_stop_patience: 10
    early_stop_warmup: 10
    epochs: 30
    eta_min: 1.0e-05
    huber_delta: 0.1
    k_fold: 4
    loss: huber
    lr: 0.001
    regime_balanced_sampling:
      assist_channel_idx: 49
      assist_quantiles:
      - 0.5
      - 0.8
      enable: true
      hard_case_assist_threshold: 0.015
      hard_case_multiplier: 2.0
      hard_case_target_threshold: 0.95
      speed_bins:
      - 0.9
      - 1.15
      steady_dy_threshold: 0.003
    save_dir: ./runs_tcn
    steady_bias_loss:
      assist_channel_idx: 49
      assist_gamma: 1.5
      assist_scale: 0.02
      assist_threshold: 0.01
      dy_threshold: 0.0025
      enable: true
      margin: 0.0
      under_only: true
      weight: 0.1
    task_type: regression
    wd: 0.001
03_eval:
  data:
    est_tick_ranges:
    - 5
    normalize: true
    stride: 5
    stride_inf: 1
    time_window_output: 1
    window_size: 300
    y_delay: 5
  scaler_path: ./runs_tcn/scaler.npz
  split:
    level: subject
    loso_subjects:
    - m2_S008
    manual:
      test:
      - m2_S008
      val:
      - m2_S007
    mode: loso
    ratio:
    - 0.7
    - 0.15
    - 0.15
    save_to: null
    seed: 42
  train:
    device: cuda
conditions: &id001
- level_075mps
- level_100mps
- level_125mps
- accel_sine
- decline_5deg
- incline_10deg
- stopandgo
cv_mode: loso
data_path: ./combined_data_S008.h5
est_tick_ranges:
- 5
exp_name: exp_S3A2_R1_d1_reference
shared:
  conditions: *id001
  data:
    est_tick_ranges:
    - 5
    normalize: true
    stride: 5
    stride_inf: 1
    time_window_output: 1
    window_size: 300
    y_delay: 5
  data_sources:
    milestone2:
      exclude_subjects: []
      path: ../combined_data_S008.h5
      prefix: m2_
  input_vars:
  - - derived/body_frame_imu
    - - accel_right
      - accel_forward
      - accel_up
      - gyro_right
      - gyro_forward
      - gyro_up
      - forward_accel_overground
  - - derived/imu_integrated_speed
    - - imu_integrated_speed
  - - robot/left
    - - hip_angle
      - hip_angle_dot
      - hip_angle_ddot
      - thigh_angle
      - thigh_angle_dot
      - thigh_angle_ddot
  - - robot/right
    - - hip_angle
      - hip_angle_dot
      - hip_angle_ddot
      - thigh_angle
      - thigh_angle_dot
      - thigh_angle_ddot
  - - derived/robot_biomech_rt
    - - cadence_l
      - cadence_r
      - cadence_mean
      - step_time_mean
      - hip_excursion_rms
      - thigh_excursion_rms
      - hip_sep_excursion_rms
      - thigh_sep_excursion_rms
      - trunk_pitch
      - trunk_pitch_rate
      - trunk_pitch_rms
      - trunk_harmonic_ratio
      - step_length_proxy
      - step_length_proxy_norm
      - speed_anchor_geom
      - pseudo_speed_robot
  - - derived/robot_biomech_rt
    - - hip_power_l
      - hip_power_r
      - thigh_power_l
      - thigh_power_r
      - power_prop_sum
      - power_brake_sum
      - motor_power_l
      - motor_power_r
      - deflection_rms_l
      - deflection_rms_r
      - stiffness_proxy_sum
      - damping_proxy_sum
      - torque_abs_ema_fast_sum
      - torque_abs_ema_slow_sum
      - torque_signed_ema_fast_sum
      - torque_signed_ema_slow_sum
      - assist_proxy_sum
      - torque_stride_impulse_sum
      - torque_preview_sum_100ms
      - torque_preview_delta_sum_100ms
      - stiffness_proxy_l
      - stiffness_proxy_r
  - - sub_info
    - - height
      - weight
  lpf_cutoff: 0.5
  lpf_order: 4
  model:
    ar_feedback:
      enable: false
    bias_scale: 0.18
    branch_channels:
    - 24
    - 24
    - 48
    - 48
    branch_input_dims:
    - 20
    - 16
    - 24
    channels:
    - 24
    - 24
    - 48
    - 48
    dropout: 0.15
    gate_temperature: 1.0
    gru_hidden: 32
    head_dropout: 0.25
    head_hidden:
    - 64
    input_norm_type: instance
    kernel_size: 5
    model_norm: batch
    residual_scale: 0.05
    state_leak: 0.94
    type: PersistentBiasTCN_GRU
    use_input_norm: true
    use_norm: true
  output_vars:
  - - common
    - - speed_y
  subjects: &id002
  - m2_S001
  - m2_S002
  - m2_S003
  - m2_S004
  - m2_S005
  - m2_S006
  - m2_S007
  - m2_S008
  target_lpf_mode: zero_phase
subjects: *id002
tcn_channels: *id003
