exp_name: exp_S3A1_B1_cadence_step_length
cv_mode: loso
shared:
  data_sources:
    milestone2:
      path: ../combined_data_S008.h5
      prefix: m2_
      exclude_subjects: []
  subjects:
  - m2_S001
  - m2_S002
  - m2_S003
  - m2_S004
  - m2_S005
  - m2_S006
  - m2_S007
  - m2_S008
  conditions:
  - level_075mps
  - level_100mps
  - level_125mps
  - accel_sine
  - decline_5deg
  - incline_10deg
  - stopandgo
  input_vars:
  - - derived/body_frame_imu
    - - accel_right
      - accel_forward
      - accel_up
      - gyro_right
      - gyro_forward
      - gyro_up
      - forward_accel_overground
  - - derived/imu_integrated_speed
    - - imu_integrated_speed
  - - robot/left
    - - hip_angle
      - hip_angle_dot
      - hip_angle_ddot
      - thigh_angle
      - thigh_angle_dot
      - thigh_angle_ddot
  - - robot/right
    - - hip_angle
      - hip_angle_dot
      - hip_angle_ddot
      - thigh_angle
      - thigh_angle_dot
      - thigh_angle_ddot
  - - derived/robot_biomech_rt
    - - cadence_l
      - cadence_r
      - cadence_mean
      - step_time_mean
      - hip_excursion_rms
      - thigh_excursion_rms
      - hip_sep_excursion_rms
      - thigh_sep_excursion_rms
      - trunk_pitch
      - trunk_pitch_rate
      - trunk_pitch_rms
      - trunk_harmonic_ratio
      - step_length_proxy
      - step_length_proxy_norm
      - speed_anchor_geom
      - pseudo_speed_robot
  - - sub_info
    - - height
      - weight
  output_vars:
  - - common
    - - speed_y
  lpf_cutoff: 0.5
  lpf_order: 4
  target_lpf_mode: zero_phase
  data:
    window_size: 300
    stride: 5
    stride_inf: 1
    y_delay: 5
    est_tick_ranges:
    - 5
    normalize: true
    time_window_output: 1
  model:
    type: CadenceStepLengthTCN_GRU
    gru_hidden: 32
    channels:
    - 24
    - 24
    - 48
    - 48
    branch_channels:
    - 24
    - 24
    - 48
    - 48
    branch_input_dims:
    - 20
    - 18
    kernel_size: 5
    dropout: 0.15
    use_norm: true
    head_hidden:
    - 64
    head_dropout: 0.25
    model_norm: batch
    use_input_norm: true
    input_norm_type: instance
    residual_scale: 0.05
    ar_feedback:
      enable: false
02_train:
  data:
    window_size: 300
    stride: 5
    stride_inf: 1
    y_delay: 5
    est_tick_ranges:
    - 5
    normalize: true
    time_window_output: 1
    normalize_type: standard
    use_physical_velocity_model: false
    use_gait_phase: false
  model:
    type: CadenceStepLengthTCN_GRU
    gru_hidden: 32
    channels:
    - 24
    - 24
    - 48
    - 48
    branch_channels:
    - 24
    - 24
    - 48
    - 48
    branch_input_dims:
    - 20
    - 18
    kernel_size: 5
    dropout: 0.15
    use_norm: true
    head_hidden:
    - 64
    head_dropout: 0.25
    model_norm: batch
    use_input_norm: true
    input_norm_type: instance
    residual_scale: 0.05
    ar_feedback:
      enable: false
  loader:
    batch_size: 128
    val_batch_size: 256
  train:
    task_type: regression
    loss: huber
    huber_delta: 0.1
    epochs: 30
    lr: 0.001
    wd: 0.001
    amp: true
    device: cuda
    save_dir: ./runs_tcn
    early_stop_patience: 10
    early_stop_min_delta: 0.0001
    early_stop_warmup: 10
    k_fold: 4
    cos_T0: 10
    cos_Tmult: 1
    eta_min: 1.0e-05
    augment_noise_std: 0.02
    allow_tf32: true
    cudnn_benchmark: true
    clear_cuda_cache_each_epoch: false
03_eval:
  split:
    mode: loso
    level: subject
    seed: 42
    ratio:
    - 0.7
    - 0.15
    - 0.15
    manual:
      val:
      - m2_S007
      test:
      - m2_S008
    save_to: null
    loso_subjects:
    - m2_S008
  data:
    window_size: 300
    stride: 5
    stride_inf: 1
    y_delay: 5
    est_tick_ranges:
    - 5
    normalize: true
    time_window_output: 1
  train:
    device: cuda
  scaler_path: ./runs_tcn/scaler.npz
